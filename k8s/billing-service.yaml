apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: patient-mgmt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: patient-mgmt/billing-service:latest
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "4001"
            - name: GRPC_PORT
              value: "9001"
          ports:
            - containerPort: 4001
            - containerPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: patient-mgmt
spec:
  selector:
    app: billing-service
  ports:
    - name: http
      port: 4001
      targetPort: 4001
    - name: grpc
      port: 9001
      targetPort: 9001
