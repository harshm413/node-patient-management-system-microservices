version: '3.8'

services:
  # --- DATABASES ---
  auth-service-db:
    image: postgres:17
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    ports:
      - "15432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5

  patient-service-db:
    image: postgres:17
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    ports:
      - "15433:5432"
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- KAFKA ---
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- APPLICATION SERVICES ---
  auth-service:
    build:
      context: ./auth-service
    environment:
      PORT: "4005"
      DATABASE_URL: "postgresql://admin_user:password@auth-service-db:5432/db"
      JWT_SECRET: "Y2hhVEc3aHJnb0hYTzMyZ2ZqVkpiZ1RkZG93YWxrUkM="
    ports:
      - "4005:4005"
    depends_on:
      auth-service-db:
        condition: service_healthy
    restart: on-failure

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    environment:
      PORT: "4001"
      GRPC_PORT: "9001"
    ports:
      - "4001:4001"
      - "9001:9001"
    restart: on-failure

  patient-service:
    build:
      context: .
      dockerfile: patient-service/Dockerfile
    environment:
      PORT: "4000"
      DATABASE_URL: "postgresql://admin_user:password@patient-service-db:5432/db"
      BILLING_SERVICE_ADDRESS: "billing-service"
      BILLING_SERVICE_GRPC_PORT: "9001"
      KAFKA_BROKERS: "kafka:9092"
    ports:
      - "4000:4000"
    depends_on:
      patient-service-db:
        condition: service_healthy
      billing-service:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: on-failure

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    environment:
      PORT: "4002"
      KAFKA_BROKERS: "kafka:9092"
    ports:
      - "4002:4002"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
    environment:
      PORT: "4004"
      AUTH_SERVICE_URL: "http://auth-service:4005"
      PATIENT_SERVICE_URL: "http://patient-service:4000"
    ports:
      - "4004:4004"
    depends_on:
      - auth-service
      - patient-service
    restart: on-failure

  # --- NGINX REVERSE PROXY ---
  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    restart: on-failure

volumes:
  auth-db-data:
  patient-db-data:
